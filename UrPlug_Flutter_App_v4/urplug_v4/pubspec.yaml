name: urplug
description: >
  Ur Plug — zone-based service provider discovery & matching platform for Uganda.
  No GPS, no payments. Discovery, trust, and direct communication.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  collection: ^1.18.0
  shared_preferences: ^2.2.3

  # ── Firebase is intentionally excluded from pubspec ─────────────────────────
  # FlutLab runs Flutter Web and the Firebase JS SDK causes RequireJS module
  # load failures + pub.dev 400 errors in FlutLab's build environment.
  #
  # The app runs in FULL DEMO MODE in FlutLab:
  #   - Auth  → any phone number + OTP code "123456"
  #   - Data  → MockData (in-memory providers, reviews, job posts)
  #   - Chat  → in-memory message list
  #
  # To add real Firebase for a production Android/iOS build:
  #   1. Uncomment the packages below
  #   2. Run: flutterfire configure
  #   3. Replace firebase_options.dart with the generated version
  #
  # firebase_core: ^3.3.0
  # firebase_auth: ^5.1.4
  # cloud_firestore: ^5.2.1
  # firebase_storage: ^12.1.3
  # firebase_messaging: ^15.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/
