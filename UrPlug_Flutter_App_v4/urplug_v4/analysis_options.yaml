# analysis_options.yaml
# Using a minimal ruleset compatible with FlutLab's Flutter 3.x environment.
# The flutter_lints 4.0.0 package includes newer lint rules that FlutLab's
# Dart SDK does not yet recognise — this file overrides with a stable subset.

include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - '**/*.g.dart'
    - '**/*.freezed.dart'
  errors:
    # Treat as warnings rather than errors
    deprecated_member_use: warning
    unused_import: warning

linter:
  rules:
    # Core Flutter rules — all supported on Dart 3.0+
    avoid_print: true
    avoid_unnecessary_containers: true
    avoid_web_libraries_in_flutter: true
    no_logic_in_create_state: true
    prefer_const_constructors: true
    prefer_const_constructors_in_immutables: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true
    sized_box_for_whitespace: true
    use_key_in_widget_constructors: true
    use_full_hex_values_for_flutter_colors: true
